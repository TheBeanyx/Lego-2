<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR-kód olvasó naplóval</title>

  <!-- QR scanner könyvtár -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 15px;
    }

    h1 {
      text-align: center;
    }

    #reader {
      width: 100%;
      max-width: 400px;
      margin: auto;
    }

    button {
      padding: 10px;
      margin: 5px 0;
      width: 100%;
      font-size: 16px;
    }

    .log {
      margin-top: 20px;
      background: white;
      padding: 10px;
      border-radius: 5px;
    }

    .log-item {
      border-bottom: 1px solid #ddd;
      padding: 5px 0;
      font-size: 14px;
    }
  </style>
</head>
<body>

<h1>📷 QR-kód olvasó</h1>

<div id="reader"></div>

<button onclick="startCamera()">📷 Kamera indítása</button>
<button onclick="stopCamera()">⛔ Kamera leállítása</button>

<hr>

<h3>🖼️ QR-kód képből</h3>
<input type="file" id="fileInput" accept="image/*">

<div class="log">
  <h3>📒 Beolvasott QR-kódok</h3>
  <div id="logList"></div>
</div>

<script>
  const logList = document.getElementById("logList");
  const html5QrCode = new Html5Qrcode("reader");

  function addToLog(text) {
    const time = new Date().toLocaleString();
    const div = document.createElement("div");
    div.className = "log-item";
    div.textContent = `[${time}] ${text}`;
    logList.prepend(div);
  }

  function startCamera() {
    Html5Qrcode.getCameras().then(cameras => {
      if (cameras.length > 0) {
        html5QrCode.start(
          cameras[0].id,
          { fps: 10, qrbox: 250 },
          qrCodeMessage => {
            addToLog(qrCodeMessage);
          }
        );
      }
    });
  }

  function stopCamera() {
    html5QrCode.stop().catch(() => {});
  }

  document.getElementById("fileInput").addEventListener("change", e => {
    const file = e.target.files[0];
    if (!file) return;

    html5QrCode.scanFile(file, true)
      .then(decodedText => {
        addToLog(decodedText);
      })
      .catch(() => {
        alert("Nem található QR-kód a képen.");
      });
  });
</script>

</body>
