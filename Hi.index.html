<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Creator & Scanner</title>

<!-- Könyvtárak -->
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>

<style>
body {
  font-family: system-ui, sans-serif;
  background: linear-gradient(135deg, #4f46e5, #22c55e);
  margin: 0;
  padding: 15px;
  color: #111;
}

.container {
  max-width: 420px;
  margin: auto;
  background: #fff;
  border-radius: 16px;
  padding: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

h1, h2 {
  text-align: center;
}

.section {
  margin-bottom: 20px;
}

input, button {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 16px;
}

button {
  background: #4f46e5;
  color: white;
  border: none;
}

button.secondary {
  background: #22c55e;
}

button.stop {
  background: #ef4444;
}

#qrcode {
  display: flex;
  justify-content: center;
  margin-top: 15px;
}

#reader {
  width: 100%;
}

.log {
  max-height: 200px;
  overflow-y: auto;
  background: #f9fafb;
  border-radius: 10px;
  padding: 10px;
  font-size: 14px;
}

.log-item {
  border-bottom: 1px solid #ddd;
  padding: 6px 0;
}
</style>
</head>

<body>
<div class="container">

<h1>📷 QR Creator & Scanner</h1>

<!-- CREATOR -->
<div class="section">
  <h2>✍️ QR Creator</h2>
  <input type="text" id="nameInput" placeholder="Írd be a nevet">
  <button class="secondary" onclick="createQR()">QR létrehozása</button>
  <div id="qrcode"></div>
</div>

<!-- SCANNER -->
<div class="section">
  <h2>📷 QR Olvasó</h2>
  <div id="reader"></div>
  <button onclick="startCamera()">Kamera indítása</button>
  <button class="stop" onclick="stopCamera()">Kamera leállítása</button>
  <input type="file" id="fileInput" accept="image/*">
</div>

<!-- LOG -->
<div class="section">
  <h2>📒 Napló</h2>
  <div class="log" id="logList"></div>
</div>

</div>

<script>
const html5QrCode = new Html5Qrcode("reader");
const logList = document.getElementById("logList");
let lastQRData = "";

// QR létrehozás
function createQR() {
  const name = document.getElementById("nameInput").value.trim();
  if (!name) {
    alert("Írj be egy nevet!");
    return;
  }

  const id = Math.floor(100000 + Math.random() * 900000);
  const data = `Nev: ${name}\nAzonosito: ${id}`;

  document.getElementById("qrcode").innerHTML = "";
  new QRCode(document.getElementById("qrcode"), {
    text: data,
    width: 180,
    height: 180
  });
}

// Naplózás
function addToLog(name, id) {
  const time = new Date().toLocaleString();
  const div = document.createElement("div");
  div.className = "log-item";
  div.textContent = `${name} | ${id} | ${time}`;
  logList.prepend(div);
}

// Feldolgozás
function handleQR(text) {
  if (text === lastQRData) return;
  lastQRData = text;

  const nameMatch = text.match(/Nev:\s*(.*)/);
  const idMatch = text.match(/Azonosito:\s*(\d+)/);

  if (nameMatch && idMatch) {
    addToLog(nameMatch[1], idMatch[1]);
  }
}

// Kamera
function startCamera() {
  Html5Qrcode.getCameras().then(cameras => {
    if (cameras.length) {
      html5QrCode.start(
        cameras[0].id,
        { fps: 10, qrbox: 250 },
        qrText => handleQR(qrText)
      );
    }
  });
}

function stopCamera() {
  html5QrCode.stop().catch(()=>{});
}

// Képfeltöltés
document.getElementById("fileInput").addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;

  html5QrCode.scanFile(file, true)
    .then(text => handleQR(text))
    .catch(() => alert("Nincs QR-kód a képen."));
});
</script>

</body>
</html>
